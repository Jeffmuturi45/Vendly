{% extends 'base.html' %}

{% block title %}License expired{% endblock %}

{% block body %}
<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-6">
  <div class="w-full max-w-md text-center">
    <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-2xl flex items-center
                justify-center mx-auto mb-6">
      <i class="fa-solid fa-lock text-2xl text-red-500"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-2">
      Your plan has expired
    </h1>
    <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm leading-relaxed">
      Your Vendly subscription ended on <strong>{{ expiry_date|date:"F j, Y" }}</strong>.
      Renew now to restore access to your dashboard and data.
    </p>
    <a href="{% url 'licensing:plans' %}"
       class="inline-block bg-primary hover:bg-primary-600 text-white font-bold
              px-8 py-3 rounded-2xl transition-colors mb-4">
      <i class="fa-solid fa-crown mr-2"></i> Renew subscription
    </a>
    <br/>
    <a href="{% url 'accounts:logout' %}"
       class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
      Sign out
    </a>
  </div>
</div>
{% endblock %}
